<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartQuiz</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Patrick+Hand&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <!-- HEADER (login seulement) -->
  <header class="header">
    <button class="header__login-btn">Connexion</button>
  </header>

  <!-- MAIN -->
  <main class="container">

    <!-- TITLE -->
    <h1 class="main-title">SmartQuiz 🎯</h1>

    <!-- HERO -->
    <section class="hero">
      <h2 class="hero__title">Choisis un thème 🎭</h2>
      <p class="hero__subtitle">Films, séries, animés… à toi de jouer !</p>
    </section>

    <!-- THEMES -->
    <section class="quiz-list">

      <div class="card">
        <img class="card__image" src="https://fr.web.img6.acsta.net/r_1280_720/pictures/19/07/04/09/54/2407312.jpg" alt="Quiz Humour">
        <div class="card__content">
          <h3 class="card__title">😂 Humour</h3>
          <button class="card__btn">Choisir</button>
        </div>
      </div>

      <div class="card">
        <img class="card__image" src="https://fr.web.img4.acsta.net/c_310_420/pictures/22/05/30/15/20/3240867.jpg" alt="Quiz Romance">
        <div class="card__content">
          <h3 class="card__title">❤️ Romance</h3>
          <button class="card__btn">Choisir</button>
        </div>
      </div>

      <div class="card">
        <img class="card__image" src="https://m.media-amazon.com/images/I/719U3Mg9DDL._AC_UF1000,1000_QL80_.jpg" alt="Quiz Drame">
        <div class="card__content">
          <h3 class="card__title">🎭 Drame</h3>
          <button class="card__btn">Choisir</button>
        </div>
      </div>

      <div class="card">
        <img class="card__image" src="https://www.ecranlarge.com/content/uploads/2019/11/y05x9rl0ficewovstppcpcqwhvf-161.jpg" alt="Quiz Horreur">
        <div class="card__content">
          <h3 class="card__title">😱 Horreur</h3>
          <button class="card__btn">Choisir</button>
        </div>
      </div>

    </section>

  </main>

  <!-- FOOTER -->
  <footer class="footer">
    <p>© 2026 SmartQuiz</p>
  </footer>

</body>
</html>
